<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule-Based AI Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f8f9fb;
            color: #222;
            line-height: 1.6;
        }

        .container {
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h1 { margin-top: 0; }

        .hint {
            color: #555;
            font-size: 0.95rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            box-sizing: border-box;
            border: 1px solid #bbb;
            border-radius: 8px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            cursor: pointer;
        }

        button:hover { background: #444; }

        .message-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            background: #f1f3f5;
        }

        code {
            background: #eef1f4;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rule-Based AI Demo</h1>
        <p class="hint">
            Try messages like <code>hello</code>, <code>what is rule-based ai</code>,
            <code>how should I revise</code>, <code>methodology</code>, or <code>bye</code>.
        </p>

        <form method="POST">
            <label for="message"><strong>Your message</strong></label>
            <input
                type="text"
                id="message"
                name="message"
                placeholder="Type a message for the AI"
                value="{{ user_message }}"
            >
            <button type="submit">Send</button>
        </form>

        {% if response %}
        <div class="message-box">
            <strong>AI response:</strong>
            <p>{{ response }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
