<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Scrolling Chatbot with Markdown</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1020px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; display: flex; flex-direction: column; height: 90vh; }
        h1 { text-align: center; }
        
        .chat-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            border: 1px solid #eee; 
            padding: 15px; 
            margin-bottom: 10px; 
            background-color: #f9f9f9; 
            display: flex; 
            flex-direction: column;
        }

        /* Styling for the Markdown elements */
        .message { padding: 8px 10px; margin: 5px 0; border-radius: 5px; max-width: 80%; }
        .user-message { 
            background-color: #d1e7ff; 
            align-self: flex-end; 
        }
        .assistant-message { 
            background-color: #e9ecef; 
            align-self: flex-start; 
        }
        
        /* Basic styling for code blocks generated by Markdown */
        .assistant-message pre {
            background-color: #333;
            color: white;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }

        form { display: flex; margin-top: auto; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; }
        button { padding: 10px 15px; background-color: #007BFF; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Experiment Interface</h1>
    
    <div class="chat-container" id="chat-container">
        {% for message in history %}
            {% if message.role == 'user' %}
                <div class="message user-message">
                    **You**: {{ message.content }}
                </div>
            {% elif message.role == 'assistant' %}
                <div class="message assistant-message">
                    <div id="msg-{{ loop.index }}" class="markdown-content"></div>
                    <script id="markdown-{{ loop.index }}" type="text/markdown">
                        **Model**: {{ message.content }}
                    </script>
                </div>
            {% endif %}
        {% endfor %}
    </div>

    <form method="POST" action="/">
        <input type="text" name="user_input" placeholder="Type your message here..." required>
        <button type="submit">Send</button>
    </form>
    
    <script>
        // Find all the hidden script tags containing markdown content
        const markdownScripts = document.querySelectorAll('script[type="text/markdown"]');

        markdownScripts.forEach(script => {
            const index = script.id.split('-')[1];
            const targetElement = document.getElementById(`msg-${index}`);
            const markdownText = script.textContent.trim();
            
            if (targetElement && markdownText) {
                // Use marked.parse() to convert Markdown to HTML
                targetElement.innerHTML = marked.parse(markdownText);
            }
        });

        // Auto-scroll to the bottom of the chat container when the page loads
        const container = document.getElementById('chat-container');
        container.scrollTop = container.scrollHeight;
    </script>
</body>
</html>
